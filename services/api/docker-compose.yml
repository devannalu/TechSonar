services:
  postgres:
    image: postgres:16
    container_name: techsonar_postgres
    restart: always
    environment:
      POSTGRES_USER: techsonar
      POSTGRES_PASSWORD: techsonar
      POSTGRES_DB: techsonar_dev
    ports:
      - "5432:5432"
    volumes:
      - techsonar_postgres_data:/var/lib/postgresql/data

volumes:
  techsonar_postgres_data:
